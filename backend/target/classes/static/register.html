<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance - Create Account</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- Background Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Main Container -->
    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="icon-container">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <h1>Create Account</h1>
                <p>Join QR Attendance today</p>
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Create a password" required>
                        <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
                        <i class="fa-regular fa-eye toggle-password" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <div class="password-requirements">
                    <p>Password must contain:</p>
                    <ul class="requirements-list">
                        <li id="req-length" class="requirement-item">
                            <i class="fa-solid fa-check"></i> At least 8 characters
                        </li>
                        <li id="req-case" class="requirement-item">
                            <i class="fa-solid fa-check"></i> Mix of uppercase and lowercase
                        </li>
                        <li id="req-special" class="requirement-item">
                            <i class="fa-solid fa-check"></i> At least one number or special character
                        </li>
                    </ul>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="footer">
                <a href="login.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i> Back to Sign In
                </a>
            </div>

        </div>
    </div>

    <script src="register.js"></script>
</body>

</html>
